[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Gmail OAuth callback — Google redirects here; Netlify forwards query params (?code=&state=) to /
[[redirects]]
  from = "/auth/google/callback"
  to = "/"
  status = 302
  force = true

[template.environment]
  NETLIFY_IDENTITY = "true"

# Never cache HTML — always serve fresh so auth + code changes deploy instantly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
